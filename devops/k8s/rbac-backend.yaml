apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: cloudguard

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: cloudguard
  name: backend-role
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-rolebinding
  namespace: cloudguard
subjects:
- kind: ServiceAccount
  name: backend-sa
  namespace: cloudguard
roleRef:
  kind: Role
  name: backend-role
  apiGroup: rbac.authorization.k8s.io