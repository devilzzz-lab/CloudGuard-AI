apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: cloudguard

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-role
  namespace: cloudguard
rules:
# 🔹 Pods access
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]

# 🔹 Metrics API (metrics-server)
- apiGroups: ["metrics.k8s.io"]
  resources: ["pods"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-rolebinding
  namespace: cloudguard
subjects:
- kind: ServiceAccount
  name: backend-sa
  namespace: cloudguard
roleRef:
  kind: Role
  name: backend-role
  apiGroup: rbac.authorization.k8s.io