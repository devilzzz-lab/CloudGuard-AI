apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudguard-backend
  namespace: cloudguard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudguard-backend
  template:
    metadata:
      labels:
        app: cloudguard-backend
    spec:
      containers:
      - name: backend
        image: devilzz/cloudguard-backend:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 3001

        env:
        - name: MONGO_URI
          value: mongodb://mongodb:27017/cloudguard
        - name: PORT
          value: "3001"

        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"

        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3