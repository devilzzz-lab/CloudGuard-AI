apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudguard-backend
  namespace: cloudguard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudguard-backend
  template:
    metadata:
      labels:
        app: cloudguard-backend
    spec:
      containers:
      - name: backend
        image: nginx
        ports:
        - containerPort: 3001
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"